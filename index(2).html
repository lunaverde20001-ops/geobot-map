function h32(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(36);}
function dedup(n){var t=(n.titulo||'').toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,' ').trim().slice(0,80);var k=h32(t);if(S.seenH.has(k))return false;S.seenH.add(k);return true;}
function getCoords(n){if(n.coords&&n.coords.length===2&&(n.coords[0]!==0||n.coords[1]!==0))return n.coords;var t=((n.titulo||'')+' '+(n.desc||'')+(n.pais||'')).toLowerCase();var ks=Object.keys(Z).sort(function(a,b){return b.length-a.length;});for(var i=0;i<ks.length;i++){if(t.indexOf(ks[i])!==-1)return Z[ks[i]];}return null;}
function getPais(n){if(n.pais)return n.pais;var t=((n.titulo||'')+' '+(n.desc||'')).toLowerCase();var ks=Object.keys(Z).sort(function(a,b){return b.length-a.length;});for(var i=0;i<ks.length;i++){if(t.indexOf(ks[i])!==-1)return ks[i];}return '';}
function getTipo(t,d){var s=((t||'')+(d||'')).toLowerCase();if(/attack|strike|airstrike|bombing|missile|killed|invasion|offensive|shelling/.test(s))return'conflicto';if(/military|aircraft|warship|nato|fighter|bomber|fleet|navy|army/.test(s))return'militar';if(/oil|gold|opec|sanctions|market|price|crude|embargo/.test(s))return'mercados';return'conflicto';}
async function fetchRedis(){try{var r=await fetch(CFG.redis+'/lrange/'+CFG.mapKey+'/0/199',{headers:{Authorization:'Bearer '+CFG.token}});var d=await r.json();return(d.result||[]).map(function(s){try{return JSON.parse(s);}catch(e){return null;}}).filter(Boolean);}catch(e){return[];}}
async function cargar(){S.seenH.clear();var items=await fetchRedis();items.forEach(function(n){if(!n.tipo)n.tipo=getTipo(n.titulo,n.desc);if(!n.pais)n.pais=getPais(n);n._c=getCoords(n);});S.all=items.filter(function(n){return dedup(n);});S.all.sort(function(a,b){if(a.urgente&&!b.urgente)return-1;if(!a.urgente&&b.urgente)return 1;return 0;});renderPaises();renderNoticias();renderMarkers();renderStats();renderSources(items.length);}
function renderPaises(){var bar=document.getElementById('countryBar');var pm={};S.all.forEach(function(n){if(n.pais&&PL[n.pais]){if(!pm[n.pais])pm[n.pais]=0;pm[n.pais]++;}});bar.innerHTML='<button class="cb'+(S.pais==='todos'?' on':'')+'" onclick="setPais(\'todos\',this)">🌍 TODOS</button>';Object.keys(pm).sort(function(a,b){return pm[b]-pm[a];}).slice(0,12).forEach(function(p){var btn=document.createElement('button');btn.className='cb'+(S.pais===p?' on':'');btn.textContent=(PL[p]||p.toUpperCase())+' ('+pm[p]+')';btn.onclick=function(){setPais(p,this);};bar.appendChild(btn);});}
function getFiltradas(){return S.all.filter(function(n){if(S.filtro==='urgente'&&!n.urgente)return false;if(S.filtro!=='todos'&&S.filtro!=='urgente'&&n.tipo!==S.filtro)return false;if(S.pais!=='todos'&&n.pais!==S.pais)return false;return true;});}
function renderNoticias(){var lista=document.getElementById('newsList');var f=getFiltradas();document.getElementById('cnt').textContent=f.length;if(!f.length){lista.innerHTML='<div class="ld-wrap" style="font-family:var(--font-mono);font-size:.65rem;color:var(--text3)">SIN RESULTADOS</div>';return;}lista.innerHTML='';f.forEach(function(n){var div=document.createElement('div');div.className='ni'+(n.urgente?' urgente':'')+(n.id===S.sel?' active':'');div.dataset.nid=n.id;var pais=n.pais&&PL[n.pais]?PL[n.pais]:'';div.innerHTML=(n.urgente?'<div class="ni-urg">⚠ URGENTE</div>':'')+'<div class="ni-title">'+esc(n.titulo)+'</div>'+(n.desc?'<div class="ni-desc">'+esc(n.desc)+'</div>':'')+'<div class="ni-meta"><span class="ni-tag '+n.tipo+'">'+tl(n.tipo)+'</span>'+(pais?'<span class="ni-pais">'+pais+'</span>':'')+'<span class="ni-hora">'+n.hora+'</span></div><div class="ni-src">'+esc(n.fuente||'')+'</div>';div.onclick=function(){selec(n);};lista.appendChild(div);});}
function mkIcon(tipo,urg){var c={conflicto:'#ff3333',militar:'#4488ff',mercados:'#00ff88',escalada:'#ffd700'}[tipo]||'#ff8800';var sz=urg?16:11;var glow=urg?'0 0 18px '+c+',0 0 6px '+c:'0 0 8px '+c;var anim=urg?'animation:glow 1.2s infinite':'';return L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+c+';border:2px solid rgba(255,255,255,.5);border-radius:50%;box-shadow:'+glow+';'+anim+'"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});}
function renderMarkers(){S.markers.forEach(function(m){map.removeLayer(m);});S.markers=[];var f=getFiltradas();var grupos={};f.forEach(function(n){if(!n._c)return;var k=Math.round(n._c[0]*4)/4+','+Math.round(n._c[1]*4)/4;if(!grupos[k])grupos[k]={c:n._c,list:[],urg:false,tipo:n.tipo};grupos[k].list.push(n);if(n.urgente)grupos[k].urg=true;});Object.values(grupos).forEach(function(g){var n=g.list[0];var extra=g.list.length>1?' +'+( g.list.length-1)+' más':'';var col=n.tipo==='conflicto'?'#ff5555':n.tipo==='militar'?'#66aaff':'#33ffaa';var pop='<div class="pu-type" style="color:'+col+'">'+tl(n.tipo).toUpperCase()+extra+'</div><div class="pu-title">'+(n.urgente?'🚨 ':'')+esc(n.titulo)+'</div>'+(n.desc?'<div class="pu-desc">'+esc(n.desc.slice(0,120))+'…</div>':'')+'<div class="pu-foot"><span>'+esc(n.fuente||'')+'</span><span>'+n.hora+'</span></div><div class="pu-more"><span class="pu-btn" onclick="window._sm(\''+n.id+'\')">DETALLE</span><a class="pu-btn" href="'+CFG.tg+'" target="_blank">TELEGRAM</a></div>';var mk=L.marker(g.c,{icon:mkIcon(g.tipo,g.urg)}).addTo(map).bindPopup(pop,{maxWidth:260});(function(noticia){mk.on('click',function(){selec(noticia,false);});})(n);S.markers.push(mk);});document.getElementById('sb-mk').textContent=S.markers.length;}
window._sm=function(id){var n=S.all.find(function(x){return x.id==id;});if(n)selec(n,false);};
function selec(n,center){S.sel=n.id;setTab('detail',document.querySelectorAll('.tab')[0]);document.getElementById('detEmpty').style.display='none';var card=document.getElementById('detCard');card.style.display='block';var pais=n.pais&&PL[n.pais]?PL[n.pais]:'—';card.innerHTML='<div class="dc-type '+n.tipo+'">'+tl(n.tipo).toUpperCase()+'</div><div class="dc-title">'+(n.urgente?'🚨 ':'')+esc(n.titulo)+'</div>'+(n.desc?'<div class="dc-desc">'+esc(n.desc)+'</div>':'')+'<div class="dc-row"><span>REGIÓN</span><span>'+pais+'</span></div><div class="dc-row"><span>FUENTE</span><span>'+esc(n.fuente||'—')+'</span></div><div class="dc-row"><span>HORA</span><span>'+n.hora+' UTC</span></div><div class="dc-row"><span>URGENTE</span><span>'+(n.urgente?'SÍ ⚠':'NO')+'</span></div><a href="'+CFG.tg+'" target="_blank" class="dc-link">📢 CANAL TELEGRAM</a>';document.querySelectorAll('.ni').forEach(function(el){el.classList.remove('active');});var el=document.querySelector('[data-nid="'+n.id+'"]');if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}if(center!==false&&n._c)map.setView(n._c,Math.max(map.getZoom(),5),{animate:true});}
function renderStats(){document.getElementById('st-total').textContent=S.all.length;document.getElementById('st-map').textContent=S.markers.length;document.getElementById('st-hora').textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
function renderSources(total){var lista=document.getElementById('srcList');lista.innerHTML='';SRCS.forEach(function(s){var div=document.createElement('div');div.className='src-item';div.innerHTML='<div class="src-name">'+s+'</div><div class="src-row"><span>ACTIVO</span><span class="src-ok">● ONLINE</span></div>';lista.appendChild(div);});if(total){var d=document.createElement('div');d.className='src-item';d.style.marginTop='8px';d.innerHTML='<div class="src-name" style="color:var(--text2)">TOTAL EN REDIS</div><div class="src-row"><span>Noticias</span><span style="color:var(--gold)">'+total+'</span></div>';lista.appendChild(d);}}
window.setPais=function(p,btn){S.pais=p;document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderNoticias();renderMarkers();renderStats();if(p!=='todos'&&Z[p])map.setView(Z[p],5,{animate:true});};
window.setFiltro=function(f,btn){S.filtro=f;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderNoticias();renderMarkers();renderStats();};
window.setTab=function(t,btn){document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});document.querySelectorAll('.tc').forEach(function(c){c.classList.remove('on');});if(btn){btn.classList.add('on');}else{var tabs=document.querySelectorAll('.tab');if(t==='detail')tabs[0].classList.add('on');else if(t==='chat')tabs[1].classList.add('on');else tabs[2].classList.add('on');}document.getElementById('tc-'+t).classList.add('on');if(t==='chat'&&S.nick)loadChat();};
function tl(t){return{conflicto:'⚔ Conflicto',militar:'✈ Militar',mercados:'📊 Mercados',escalada:'⚠ Escalada'}[t]||'📍 General';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
if(S.nick){document.getElementById('nickForm').style.display='none';document.getElementById('chatWrap').style.display='flex';}
window.setNick=function(){var v=document.getElementById('nickIn').value.trim().slice(0,20);if(!v)return;S.nick=v;localStorage.setItem('geo_nick',v);document.getElementById('nickForm').style.display='none';document.getElementById('chatWrap').style.display='flex';loadChat();setInterval(loadChat,5000);};
async function loadChat(){try{var r=await fetch(CFG.redis+'/lrange/'+CFG.chatKey+'/0/29',{headers:{Authorization:'Bearer '+CFG.token}});var d=await r.json();var msgs=(d.result||[]).map(function(s){try{return JSON.parse(s);}catch(e){return null;}}).filter(Boolean).reverse();var c=document.getElementById('chatMsgs');var bot=c.scrollTop+c.clientHeight>=c.scrollHeight-10;c.innerHTML='';msgs.forEach(function(m){var div=document.createElement('div');div.className='chat-m'+(m.nick===S.nick?' own':'');div.innerHTML='<div class="chat-nick">'+esc(m.nick)+'</div><div class="chat-text">'+esc(m.text)+'</div><div class="chat-time">'+m.hora+'</div>';c.appendChild(div);});if(bot)c.scrollTop=c.scrollHeight;}catch(e){}}
window.sendMsg=async function(){var inp=document.getElementById('chatIn');var txt=inp.value.trim().slice(0,200);if(!txt||!S.nick)return;inp.value='';var msg=JSON.stringify({nick:S.nick,text:txt,hora:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})});try{await fetch(CFG.redis+'/pipeline',{method:'POST',headers:{Authorization:'Bearer '+CFG.token},body:JSON.stringify([['lpush',CFG.chatKey,msg],['ltrim',CFG.chatKey,0,49],['expire',CFG.chatKey,86400]])});loadChat();}catch(e){}};
setInterval(function(){S.cd--;document.getElementById('sb-cd').textContent=Math.max(0,S.cd)+'s';if(S.cd<=0){S.cd=CFG.tick;cargar();}},1000);
renderSources();cargar();
if(S.nick){loadChat();setInterval(loadChat,5000);}
</script>
</body>
</html>
