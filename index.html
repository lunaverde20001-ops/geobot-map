<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoEconOrbit — Mapa de Conflictos en Vivo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0f23; color:#fff; font-family:'Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

header {
  background:linear-gradient(90deg,#0d1b3e,#1a2a5e);
  padding:10px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid #ff3333;
  z-index:1000; flex-shrink:0;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-dot { width:12px; height:12px; background:#ff3333; border-radius:50%; animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.logo h1 { font-size:1.1rem; letter-spacing:1px; }
.logo h1 span { color:#ff3333; }
.live { background:#ff3333; padding:3px 10px; border-radius:20px; font-size:.7rem; font-weight:bold; }
.tg-btn { background:#229ed9; color:#fff; padding:6px 16px; border-radius:20px; font-weight:bold; text-decoration:none; font-size:.85rem; }

.main { display:flex; flex:1; overflow:hidden; }

.sidebar {
  width:350px; flex-shrink:0;
  background:#0d1525;
  border-right:1px solid #1e2d4a;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sb-header {
  padding:12px 15px;
  background:#111d36;
  border-bottom:1px solid #1e2d4a;
  display:flex; justify-content:space-between; align-items:center;
}
.sb-header h2 { font-size:.85rem; color:#88aadd; text-transform:uppercase; letter-spacing:1px; }
.badge { background:#ff3333; color:#fff; border-radius:20px; padding:2px 8px; font-size:.7rem; }

.filtros { padding:8px 12px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid #1e2d4a; }
.f-btn {
  padding:3px 10px; border-radius:15px;
  border:1px solid #2a4080; background:transparent;
  color:#88aadd; font-size:.72rem; cursor:pointer; transition:all .2s;
}
.f-btn.on { background:#1a3a7a; border-color:#4488dd; color:#fff; }
.f-btn:hover { background:#162035; }

.news-list { overflow-y:auto; flex:1; }
.news-list::-webkit-scrollbar { width:4px; }
.news-list::-webkit-scrollbar-thumb { background:#2a3f6a; border-radius:3px; }

.ni {
  padding:11px 14px; border-bottom:1px solid #1a2840;
  cursor:pointer; transition:background .15s;
}
.ni:hover { background:#162035; }
.ni.active { background:#1a2d50; border-left:3px solid #ff3333; }
.ni .urg { color:#ff4444; font-size:.65rem; font-weight:bold; letter-spacing:1px; margin-bottom:3px; }
.ni h3 { font-size:.82rem; color:#dde; line-height:1.4; margin-bottom:5px; }
.ni p { font-size:.72rem; color:#778; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ni-meta { display:flex; justify-content:space-between; margin-top:6px; }
.ni-tipo { font-size:.65rem; padding:2px 7px; border-radius:10px; }
.ni-tipo.conflicto { background:#420; color:#f84; }
.ni-tipo.militar    { background:#024; color:#68f; }
.ni-tipo.mercados   { background:#042; color:#4d8; }
.ni-tipo.escalada   { background:#440; color:#ff0; }
.ni-hora { font-size:.65rem; color:#556; }
.ni-src  { font-size:.65rem; color:#448; margin-top:3px; }

#map { flex:1; }

.leaflet-popup-content-wrapper {
  background:#0d1b3e; color:#dde;
  border:1px solid #2a4080; border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.6); max-width:300px;
}
.leaflet-popup-tip { background:#0d1b3e; }
.pu-title { font-size:.88rem; font-weight:bold; color:#fff; margin-bottom:6px; line-height:1.4; }
.pu-desc  { font-size:.76rem; color:#aab; line-height:1.5; margin-bottom:8px; }
.pu-meta  { display:flex; justify-content:space-between; font-size:.68rem; color:#668; }
.pu-tg    { display:block; margin-top:8px; background:#229ed9; color:#fff; text-align:center; padding:5px; border-radius:12px; font-size:.75rem; text-decoration:none; }

.statsbar {
  background:#060d1c; border-top:1px solid #1e2d4a;
  padding:5px 18px; display:flex; gap:18px;
  font-size:.72rem; color:#446; flex-shrink:0;
}
.statsbar b { color:#88aadd; }

.loading-wrap { display:flex; align-items:center; justify-content:center; height:120px; gap:8px; }
.ld { width:8px; height:8px; background:#336; border-radius:50%; animation:bounce .8s infinite alternate; }
.ld:nth-child(2){animation-delay:.2s} .ld:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-10px);opacity:.2}}

@media(max-width:768px){
  .main{flex-direction:column}
  .sidebar{width:100%;height:240px;border-right:none;border-bottom:1px solid #1e2d4a}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>Geo<span>Econ</span>Orbit</h1>
    <span class="live">● EN VIVO</span>
  </div>
  <a href="https://t.me/GeoEconOrbit" target="_blank" class="tg-btn">📢 Canal Telegram</a>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sb-header">
      <h2>🌍 Últimas noticias</h2>
      <span class="badge" id="cnt">0</span>
    </div>
    <div class="filtros">
      <button class="f-btn on"  id="f-todos"     onclick="filtrar('todos',this)">Todos</button>
      <button class="f-btn"     id="f-conflicto" onclick="filtrar('conflicto',this)">⚔️ Conflictos</button>
      <button class="f-btn"     id="f-militar"   onclick="filtrar('militar',this)">✈️ Militar</button>
      <button class="f-btn"     id="f-mercados"  onclick="filtrar('mercados',this)">📊 Mercados</button>
      <button class="f-btn"     id="f-urgente"   onclick="filtrar('urgente',this)">🚨 Urgente</button>
    </div>
    <div class="news-list" id="lista">
      <div class="loading-wrap"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div class="statsbar">
  <span>🗓️ <b id="st-hora">—</b></span>
  <span>📍 Eventos: <b id="st-total">0</b></span>
  <span>🔴 Activos: <b id="st-activos">0</b></span>
  <span>Datos: GeoEconOrbit · Redis</span>
</div>

<script>
// ── Todo en un bloque, dentro de window.onload ───────────────
window.onload = function() {

var REDIS_URL   = 'https://loved-wallaby-71460.upstash.io';
var REDIS_TOKEN = 'gQAAAAAAARckAAIncDIwNDA1YjBlMDJlMDI0YWQwYjE1YWM4YWUzODRjYmU0N3AyNzE0NjA';
var TG_CANAL    = 'https://t.me/GeoEconOrbit';

var ZONAS = {
  ukraine:[48.37,31.16], ucrania:[48.37,31.16], kyiv:[50.45,30.52],
  russia:[55.75,37.61],  rusia:[55.75,37.61],   moscow:[55.75,37.61],
  gaza:[31.35,34.30],    israel:[31.77,35.21],
  iran:[35.68,51.38],    tehran:[35.68,51.38],   teherán:[35.68,51.38],
  syria:[33.51,36.29],   siria:[33.51,36.29],
  yemen:[15.55,48.51],   houthi:[15.55,48.51],
  lebanon:[33.88,35.50], libano:[33.88,35.50],
  iraq:[33.32,44.42],    irak:[33.32,44.42],
  taiwan:[23.70,121.00], china:[35.86,104.19],
  sudan:[15.55,32.53],   sahel:[12.86,2.36],
  'red sea':[20.00,38.00], 'mar rojo':[20.00,38.00],
  opec:[24.47,54.37],    saudi:[24.68,46.72],
};

// ── Mapa ──────────────────────────────────────────────────────
var map = L.map('map', { center:[25,15], zoom:2, minZoom:1 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:18
}).addTo(map);

// ── Estado ────────────────────────────────────────────────────
var todasNoticias = [];
var markers = [];
var filtro = 'todos';

// ── Detectar coords ───────────────────────────────────────────
function getCoords(n) {
  if (n.coords && n.coords.length === 2) return n.coords;
  var t = ((n.titulo||'') + ' ' + (n.desc||'')).toLowerCase();
  for (var k in ZONAS) {
    if (t.indexOf(k) !== -1) return ZONAS[k];
  }
  var fallback = [[35,40],[25,45],[50,30],[15,44],[33,36],[20,38]];
  return fallback[Math.floor(Math.random() * fallback.length)];
}

// ── Icono marker ──────────────────────────────────────────────
function mkIcon(tipo, urgente) {
  var c = {conflicto:'#ff5533', militar:'#4488ff', mercados:'#44dd88', escalada:'#ffcc00'};
  var col = c[tipo] || '#ff8800';
  var sz = urgente ? 18 : 13;
  var anim = urgente ? 'animation:blink 1.2s infinite' : '';
  return L.divIcon({
    className:'',
    html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border:2px solid rgba(255,255,255,.7);border-radius:50%;box-shadow:0 0 '+(urgente?'14':'6')+'px '+col+';'+anim+'"></div>',
    iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
  });
}

// ── Tipo emoji ────────────────────────────────────────────────
function tipoEmoji(t) {
  return {conflicto:'⚔️',militar:'✈️',mercados:'📊',escalada:'⚠️'}[t] || '📍';
}

// ── Render ────────────────────────────────────────────────────
function render(noticias) {
  var lista = document.getElementById('lista');
  var filtradas = noticias.filter(function(n) {
    if (filtro === 'todos') return true;
    if (filtro === 'urgente') return n.urgente;
    return n.tipo === filtro;
  });

  // Limpiar markers
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];

  if (!filtradas.length) {
    lista.innerHTML = '<div class="loading-wrap" style="color:#446">Sin noticias</div>';
    document.getElementById('cnt').textContent = '0';
    return;
  }

  lista.innerHTML = '';
  var activos = new Set();

  filtradas.forEach(function(n, idx) {
    var coords = getCoords(n);
    if (n.tipo) activos.add(n.tipo);

    // ── Sidebar item ──────────────────────────────────────────
    var div = document.createElement('div');
    div.className = 'ni';
    div.id = 'ni-' + idx;
    div.innerHTML =
      (n.urgente ? '<div class="urg">🚨 URGENTE</div>' : '') +
      '<h3>' + (n.titulo||'') + '</h3>' +
      (n.desc ? '<p>' + n.desc + '</p>' : '') +
      '<div class="ni-meta">' +
        '<span class="ni-tipo ' + (n.tipo||'') + '">' + tipoEmoji(n.tipo) + ' ' + (n.tipo||'general') + '</span>' +
        '<span class="ni-hora">' + (n.hora||'') + ' UTC</span>' +
      '</div>' +
      '<div class="ni-src">📰 ' + (n.fuente||'GeoEconOrbit') + '</div>';

    (function(i, c) {
      div.onclick = function() {
        document.querySelectorAll('.ni').forEach(function(el){ el.classList.remove('active'); });
        div.classList.add('active');
        map.setView(c, 5, {animate:true});
        if (markers[i]) markers[i].openPopup();
      };
    })(idx, coords);

    lista.appendChild(div);

    // ── Marker ────────────────────────────────────────────────
    var popup =
      '<div class="pu-title">' + (n.urgente?'🚨 ':'') + (n.titulo||'') + '</div>' +
      (n.desc ? '<div class="pu-desc">' + n.desc + '</div>' : '') +
      '<div class="pu-meta"><span>📰 ' + (n.fuente||'') + '</span><span>🕐 ' + (n.hora||'') + '</span></div>' +
      '<a href="' + TG_CANAL + '" target="_blank" class="pu-tg">📢 Más noticias en Telegram</a>';

    var mk = L.marker(coords, {icon: mkIcon(n.tipo, n.urgente)})
      .addTo(map)
      .bindPopup(popup, {maxWidth:300});

    (function(i) {
      mk.on('click', function() {
        document.querySelectorAll('.ni').forEach(function(el){ el.classList.remove('active'); });
        var el = document.getElementById('ni-' + i);
        if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
      });
    })(idx);

    markers.push(mk);
  });

  document.getElementById('cnt').textContent = filtradas.length;
  document.getElementById('st-total').textContent = noticias.length;
  document.getElementById('st-activos').textContent = activos.size;
  document.getElementById('st-hora').textContent = new Date().toLocaleTimeString('es-ES');
}

// ── Filtrar ───────────────────────────────────────────────────
window.filtrar = function(tipo, btn) {
  filtro = tipo;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  render(todasNoticias);
};

// ── Demo data ─────────────────────────────────────────────────
function demoData() {
  return [
    {id:1, titulo:'Ataques con drones en región este de Ucrania', desc:'Fuerzas ucranianas reportan intercepción de múltiples UAVs rusos en Kharkiv.', fuente:'ISW', hora:'17:30', tipo:'conflicto', urgente:false, coords:[50.00,36.23]},
    {id:2, titulo:'Houthis atacan buque comercial en el Mar Rojo', desc:'Carguero impactado por misil antinave frente a costas de Yemen.', fuente:'Reuters', hora:'16:45', tipo:'conflicto', urgente:true, coords:[14.50,42.50]},
    {id:3, titulo:'WTI sube 2.1% tras tensiones en el Golfo Pérsico', desc:'Mercados reaccionan al incremento de actividad naval iraní.', fuente:'Defense News', hora:'16:00', tipo:'mercados', urgente:false, coords:[26.00,52.00]},
    {id:4, titulo:'Israel confirma operación en sur del Líbano', desc:'FDI anuncian operación contra infraestructura de Hezbollah.', fuente:'Al Jazeera', hora:'15:20', tipo:'conflicto', urgente:true, coords:[33.40,35.50]},
    {id:5, titulo:'OTAN despliega fragatas adicionales en el Báltico', desc:'La Alianza refuerza presencia naval ante maniobras rusas.', fuente:'Breaking Defense', hora:'14:10', tipo:'militar', urgente:false, coords:[58.00,20.00]},
  ];
}

// ── Fetch Redis ───────────────────────────────────────────────
async function cargar() {
  try {
    var r = await fetch(REDIS_URL + '/lrange/geobot:noticias_mapa/0/49', {
      headers: { Authorization: 'Bearer ' + REDIS_TOKEN }
    });
    var data = await r.json();
    var items = (data.result || []).map(function(s) {
      try { return JSON.parse(s); } catch(e) { return null; }
    }).filter(Boolean);

    todasNoticias = items.length ? items : demoData();
  } catch(e) {
    todasNoticias = demoData();
  }
  render(todasNoticias);
}

cargar();
setInterval(cargar, 60000);

}; // fin window.onload
</script>
</body>
</html>
