<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GeoEconOrbit • Live Intelligence</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #02070f;
      --panel: #0b1628;
      --accent: #00eaff;
      --red: #ff3366;
      --text: #c8e0ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:Arial, sans-serif; }
    
    header {
      height:52px;
      background:linear-gradient(90deg, #02070f, #0b1e35);
      border-bottom:2px solid var(--accent);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      font-family:'Orbitron', sans-serif;
    }
    .logo { font-size:1.25rem; font-weight:700; }
    .logo span { color:var(--accent); }

    .main { flex:1; display:flex; flex-direction:column; }
    
    #map { flex:1; background:#0a0e17; }
    
    .news-panel {
      height:35vh;
      background:var(--panel);
      border-top:1px solid #1e3a5f;
      overflow-y:auto;
      padding:8px;
    }
    
    .news-item {
      background:rgba(255,255,255,0.05);
      margin-bottom:8px;
      padding:10px;
      border-left:4px solid var(--accent);
      border-radius:4px;
    }
    .news-item.urgent { border-left-color:var(--red); background:rgba(255,51,102,0.1); }
    
    @media (min-width: 768px) {
      .main { flex-direction:row; }
      .news-panel { width:320px; height:100%; border-top:none; border-right:1px solid #1e3a5f; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🌍 Geo<em>Econ</em><span>Orbit</span></div>
  <div style="color:#ff3366; font-weight:bold;">● LIVE INTELLIGENCE</div>
  <a href="https://t.me/GeoEconOrbit" target="_blank" style="background:#00eaff;color:#000;padding:8px 14px;border-radius:6px;font-weight:600;text-decoration:none;">📢 CANAL TELEGRAM</a>
</header>

<div class="main">
  <!-- Mapa -->
  <div id="map"></div>

  <!-- Panel de noticias (responsive) -->
  <div class="news-panel">
    <div style="padding:8px;background:#1a2a4a;text-align:center;font-weight:600;">📰 ALERTAS EN DIRECTO</div>
    <div id="newsList">
      <!-- Aquí se añaden las noticias dinámicamente -->
    </div>
  </div>
</div>

<script>
// ==================== MAPA PROFESIONAL Y FUNCIONAL EN MÓVIL ====================
var map = L.map('map', {
  zoomControl: true,
  touchZoom: true,
  scrollWheelZoom: true
}).setView([26.5, 56.5], 6); // Centro en Ormuz

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// Iconos estáticos (sin IA)
var shipIcon = L.icon({
  iconUrl: 'https://i.imgur.com/5z3vK8P.png',   // Petrolero normal
  iconSize: [38, 38],
  iconAnchor: [19, 19]
});

var attackedIcon = L.icon({
  iconUrl: 'https://i.imgur.com/8Y7kL2m.png',   // Petrolero atacado/en llamas
  iconSize: [38, 38],
  iconAnchor: [19, 19]
});

// Ejemplo 1: Buque sale de Ormuz
var marker1 = L.marker([26.8, 56.4], {icon: shipIcon}).addTo(map)
  .bindPopup("<b>🚢 Petrolero 'Pacific Star'</b><br>Saliendo de Ormuz<br>14:12 UTC");

// Ejemplo 2: El mismo buque es atacado (cambio automático)
setTimeout(() => {
  marker1.setIcon(attackedIcon);
  marker1.bindPopup("<b>🔥 ATACADO</b><br>Petrolero 'Pacific Star' en llamas<br>Ataque con dron 14:28 UTC<br>Historial completo disponible");
  map.openPopup(marker1.getPopup());
}, 7000);

// Ejemplo 3: Otro evento
L.marker([35.7, 51.4], {icon: shipIcon}).addTo(map)
  .bindPopup("<b>🇮🇷 Irán</b><br>Maniobras militares cerca del Golfo");

// ==================== NOTICIAS VISUALES ====================
function addNews(title, desc, time) {
  const div = document.createElement('div');
  div.className = 'news-item';
  div.innerHTML = `<strong>${title}</strong><br><small>${desc}</small><br><small style="color:#88aaff;">${time}</small>`;
  document.getElementById('newsList').appendChild(div);
}

addNews("🚢 Buque tanquero sale de Ormuz", "Pacific Star detectado", "14:12");
addNews("🔥 Ataque confirmado", "Dron impacta petrolero en Ormuz", "14:28");
addNews("📈 Petróleo sube +7%", "Tensión máxima en el Estrecho", "14:31");

// Simulación de nueva alerta cada 12 segundos
setInterval(() => {
  addNews("⚡ Nueva alerta", "Movimiento naval ruso detectado", "ahora");
}, 12000);
</script>

</body>
</html>
