<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoEconOrbit — Intelligence Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
/* Tu estilo original completo – no lo toco */
:root{--bg:#020810;--bg2:#060f1e;--bg3:#0a1628;--border:#0d2444;--border2:#1a3a6a;--accent:#00d4ff;--red:#ff3333;--green:#00ff88;--gold:#ffd700;--text:#c8dff0;--text2:#6a8aaa;--text3:#3a5570;--font-hd:'Orbitron',monospace;--font-mono:'IBM Plex Mono',monospace;--font-body:'IBM Plex Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}
header{height:50px;flex-shrink:0;background:linear-gradient(90deg,#020810,#061528,#020c1a);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:relative;z-index:1000;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--red),var(--accent),transparent);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ring{width:26px;height:26px;border:2px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:glow 2s infinite;}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4;box-shadow:0 0 16px var(--accent);}}
.logo-name{font-family:var(--font-hd);font-size:.85rem;font-weight:700;letter-spacing:2px;}
.logo-name em{color:var(--accent);font-style:normal;}
.live-pill{font-family:var(--font-mono);font-size:.6rem;color:var(--red);display:flex;align-items:center;gap:5px;}
.live-dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:glow 1s infinite;}
.hd-center{display:flex;gap:20px;font-family:var(--font-mono);font-size:.62rem;color:var(--text2);}
.hd-center b{color:var(--accent);}
.btn-hd{font-family:var(--font-hd);font-size:.58rem;letter-spacing:1px;padding:5px 14px;background:transparent;border:1px solid var(--accent);color:var(--accent);text-decoration:none;transition:all .2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);cursor:pointer;}
.btn-hd:hover{background:var(--accent);color:var(--bg);}
.layout{display:flex;flex:1;overflow:hidden;}
.left{width:310px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-hd{padding:9px 13px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.panel-title{font-family:var(--font-hd);font-size:.58rem;font-weight:600;letter-spacing:2px;color:var(--accent);}
.badge{font-family:var(--font-mono);font-size:.58rem;background:rgba(0,212,255,.1);border:1px solid var(--accent);color:var(--accent);padding:1px 8px;}
.country-bar{padding:7px 10px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;}
.country-bar::-webkit-scrollbar{height:3px;}
.country-bar::-webkit-scrollbar-thumb{background:var(--border2);}
.cb{font-family:var(--font-mono);font-size:.57rem;white-space:nowrap;padding:3px 9px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .2s;flex-shrink:0;}
.cb.on{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);}
.cb:hover:not(.on){color:var(--text);}
.filters{display:flex;gap:4px;padding:7px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.fb{font-family:var(--font-mono);font-size:.57rem;padding:3px 9px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .2s;}
.fb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}
.fb:hover:not(.on){color:var(--text);}
.news-scroll{flex:1;overflow-y:auto;}
.news-scroll::-webkit-scrollbar{width:3px;}
.news-scroll::-webkit-scrollbar-thumb{background:var(--border2);}
.ni{padding:10px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.ni::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ni:hover{background:rgba(0,212,255,.03);}
.ni:hover::before{background:var(--border2);}
.ni.active{background:rgba(0,212,255,.07);}
.ni.active::before{background:var(--accent);}
.ni.urgente.active::before{background:var(--red);}
.ni-urg{font-family:var(--font-hd);font-size:.53rem;letter-spacing:2px;color:var(--red);margin-bottom:3px;}
.ni-title{font-size:.77rem;font-weight:500;color:var(--text);line-height:1.45;margin-bottom:4px;}
.ni-desc{font-size:.68rem;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ni-meta{display:flex;gap:7px;margin-top:6px;align-items:center;flex-wrap:wrap;}
.ni-tag{font-family:var(--font-mono);font-size:.56rem;padding:1px 7px;border:1px solid;}
.ni-tag.conflicto{border-color:#ff3333;color:#ff5555;background:rgba(255,51,51,.07);}
.ni-tag.militar{border-color:#4488ff;color:#66aaff;background:rgba(68,136,255,.07);}
.ni-tag.mercados{border-color:#00ff88;color:#33ffaa;background:rgba(0,255,136,.07);}
.ni-tag.escalada{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.07);}
.ni-pais{font-family:var(--font-mono);font-size:.56rem;color:var(--text3);}
.ni-hora{font-family:var(--font-mono);font-size:.56rem;color:var(--text3);}
.ni-src{font-family:var(--font-mono);font-size:.56rem;color:var(--text3);margin-top:3px;}
#map{flex:1;}
.leaflet-container{background:var(--bg)!important;}
.right{width:290px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;font-family:var(--font-hd);font-size:.52rem;letter-spacing:1.5px;padding:9px 4px;text-align:center;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;background:transparent;transition:all .2s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,.04);}
.tc{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tc.on{display:flex;}
.det-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-family:var(--font-mono);font-size:.62rem;text-align:center;padding:20px;}
.det-empty .ico{font-size:2.5rem;opacity:.25;}
.det-card{padding:14px;overflow-y:auto;flex:1;}
.det-card::-webkit-scrollbar{width:3px;}
.det-card::-webkit-scrollbar-thumb{background:var(--border2);}
.dc-type{font-family:var(--font-hd);font-size:.52rem;letter-spacing:2px;margin-bottom:7px;}
.dc-type.conflicto{color:var(--red);}
.dc-type.militar{color:#66aaff;}
.dc-type.mercados{color:var(--green);}
.dc-title{font-size:.88rem;font-weight:500;line-height:1.5;margin-bottom:10px;color:#fff;}
.dc-desc{font-size:.73rem;color:var(--text2);line-height:1.6;margin-bottom:13px;}
.dc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:.6rem;}
.dc-row span:first-child{color:var(--text3);}
.dc-link{display:block;margin-top:13px;text-align:center;font-family:var(--font-hd);font-size:.58rem;letter-spacing:1px;padding:8px;background:rgba(0,212,255,.08);border:1px solid var(--accent);color:var(--accent);text-decoration:none;transition:all .2s;}
.dc-link:hover{background:var(--accent);color:var(--bg);}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);}
.chat-m{background:var(--bg3);border:1px solid var(--border);border-radius:0 6px 6px 6px;padding:7px 9px;max-width:92%;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.chat-m.own{align-self:flex-end;border-radius:6px 0 6px 6px;background:rgba(0,212,255,.07);border-color:var(--border2);}
.chat-nick{font-family:var(--font-mono);font-size:.56rem;color:var(--accent);margin-bottom:3px;}
.chat-m.own .chat-nick{color:var(--green);}
.chat-text{font-size:.7rem;color:var(--text);line-height:1.45;}
.chat-time{font-family:var(--font-mono);font-size:.53rem;color:var(--text3);margin-top:3px;text-align:right;}
.chat-form{padding:9px;border-top:1px solid var(--border);display:flex;gap:5px;}
.chat-in{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.68rem;padding:6px 9px;outline:none;transition:border .2s;}
.chat-in:focus{border-color:var(--border2);}
.chat-btn{font-family:var(--font-hd);font-size:.52rem;letter-spacing:1px;padding:6px 10px;background:rgba(0,212,255,.08);border:1px solid var(--accent);color:var(--accent);cursor:pointer;transition:all .2s;}
.chat-btn:hover{background:var(--accent);color:var(--bg);}
.nick-form{padding:20px;display:flex;flex-direction:column;gap:10px;}
.nick-form label{font-family:var(--font-mono);font-size:.62rem;color:var(--text2);}
.nick-in{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:.72rem;padding:8px 10px;outline:none;width:100%;}
.nick-btn{font-family:var(--font-hd);font-size:.58rem;letter-spacing:1px;padding:9px;background:rgba(0,212,255,.08);border:1px solid var(--accent);color:var(--accent);cursor:pointer;transition:all .2s;}
.nick-btn:hover{background:var(--accent);color:var(--bg);}
.src-list{flex:1;overflow-y:auto;padding:8px;}
.src-list::-webkit-scrollbar{width:3px;}
.src-list::-webkit-scrollbar-thumb{background:var(--border2);}
.src-item{background:var(--bg3);border:1px solid var(--border);padding:7px 10px;margin-bottom:5px;}
.src-name{font-family:var(--font-mono);font-size:.63rem;color:var(--accent);}
.src-row{display:flex;justify-content:space-between;margin-top:3px;font-family:var(--font-mono);font-size:.56rem;color:var(--text2);}
.src-ok{color:var(--green);}
.leaflet-popup-content-wrapper{background:var(--bg3)!important;color:var(--text)!important;border:1px solid var(--border2)!important;border-radius:0!important;box-shadow:0 4px 30px rgba(0,0,0,.9)!important;max-width:260px!important;}
.leaflet-popup-tip-container{display:none;}
.pu-type{font-family:var(--font-hd);font-size:.52rem;letter-spacing:2px;margin-bottom:5px;}
.pu-title{font-size:.8rem;font-weight:500;color:#fff;line-height:1.4;margin-bottom:6px;}
.pu-desc{font-size:.68rem;color:var(--text2);line-height:1.4;margin-bottom:7px;}
.pu-foot{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.56rem;color:var(--text3);}
.pu-more{display:flex;gap:6px;margin-top:8px;}
.pu-btn{flex:1;text-align:center;font-family:var(--font-hd);font-size:.53rem;padding:5px;background:rgba(0,212,255,.08);border:1px solid var(--accent);color:var(--accent);text-decoration:none;transition:all .2s;cursor:pointer;}
.pu-btn:hover{background:var(--accent);color:var(--bg);}
.statusbar{height:24px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:20px;padding:0 15px;font-family:var(--font-mono);font-size:.58rem;color:var(--text3);}
.statusbar b{color:var(--accent);}
.ld-wrap{display:flex;align-items:center;justify-content:center;height:100px;gap:6px;}
.ld{width:5px;height:5px;background:var(--border2);border-radius:50%;animation:lb .7s infinite alternate;}
.ld:nth-child(2){animation-delay:.15s}.ld:nth-child(3){animation-delay:.3s}
@keyframes lb{to{transform:translateY(-8px);background:var(--accent)}}
@media(max-width:900px){.left{width:260px}.right{display:none;}}
@media(max-width:600px){.left{display:none;}}
#loader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
.loader-inner{text-align:center;color:var(--accent);font-family:var(--font-hd);font-size:1.2rem;}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-inner">
    <div class="ld-wrap">
      <div class="ld"></div><div class="ld"></div><div class="ld"></div>
    </div>
    <div id="ld-txt">Inicializando mapa...</div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-ring"><div class="logo-dot"></div></div>
    <div class="logo-name">Geo<em>Econ</em>Orbit</div>
  </div>
  <div class="live-pill">
    <div class="live-dot"></div> LIVE INTEL
  </div>
  <a href="https://t.me/GeoEconOrbit" target="_blank" class="btn-hd">CANAL TELEGRAM</a>
</header>

<div class="layout">
  <div class="left">
    <div class="panel-hd">
      <div class="panel-title">FUENTES ACTIVAS</div>
      <div class="badge">ONLINE</div>
    </div>
    <div class="src-list" id="srcList">
      <!-- Fuentes se cargan aquí -->
    </div>
  </div>

  <div id="map"></div>

  <div class="right">
    <div class="tabs">
      <button class="tab on" onclick="setTab('detail',this)">DETALLE</button>
      <button class="tab" onclick="setTab('chat',this)">CHAT</button>
      <button class="tab" onclick="setTab('sources',this)">FUENTES</button>
    </div>
    <div id="tc-detail" class="tc on">
      <div class="det-empty">
        <div class="ico">📍</div>
        Selecciona un evento en el mapa
      </div>
      <div id="detCard" class="det-card" style="display:none;"></div>
    </div>
    <div id="tc-chat" class="tc">
      <div class="chat-wrap">
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-form">
          <input id="chatIn" class="chat-in" placeholder="Escribe mensaje...">
          <button class="chat-btn" onclick="sendMsg()">ENVIAR</button>
        </div>
      </div>
    </div>
    <div id="tc-sources" class="tc">
      <div class="src-list" id="srcListRight"></div>
    </div>
  </div>
</div>

<div class="statusbar">
  <b id="sb-mk">0 marcadores</b>
  <b id="sb-ev">0 eventos</b>
  <b id="sb-hora">--:-- UTC</b>
</div>

<script>
// =============================================
// INICIALIZACIÓN INMEDIATA DEL MAPA (CRÍTICO)
// =============================================
let map = L.map('map', {
  zoomControl: true,
  worldCopyJump: true
}).setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// =============================================
// FORZAR OCULTAR LOADER EN MÁX 4 SEGUNDOS
// =============================================
function hideLoader() {
  const loader = document.getElementById('loader');
  if (loader) {
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 400);
  }
}
setTimeout(hideLoader, 4000);

// =============================================
// CARGA DE FUENTES (NO BLOQUEANTE)
// =============================================
async function loadSources() {
  try {
    const res = await fetch(CFG.redis + '/lrange/' + CFG.mapKey + '/0/199', {
      headers: { Authorization: `Bearer ${CFG.token}` },
      signal: AbortSignal.timeout(5000)  // Timeout 5s para no bloquear
    });
    if (!res.ok) throw new Error("Redis error");
    const d = await res.json();
    const items = (d.result || []).map(s => {
      try { return JSON.parse(s); } catch(e) { return null; }
    }).filter(Boolean);
    renderEvents(items);
  } catch (e) {
    console.error("Error fuentes:", e);
    // Fallback: mostrar demo
    renderEvents([
      {lat:32,lon:44,title:'Demo conflicto',type:'attack',severity:0.8}
    ]);
  }
}

// =============================================
// INICIO
// =============================================
initMap();      // mapa PRIMERO
loadSources();  // fuentes DESPUÉS
// ... resto de tu código original (start(), fetchNews(), etc.)

// Actualización automática cada 60s (no bloquea)
setInterval(loadSources, 60000);
</script>
</body>
</html>
