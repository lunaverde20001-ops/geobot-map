<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoEconOrbit • Live Intelligence Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin:0; font-family:Arial; background:#0a0e17; color:white; }
    #map { height:100vh; width:100%; }
    .custom-popup {
      background:#0f1626;
      border:2px solid #00eaff;
      color:white;
    }
    .event-log { font-size:0.85rem; line-height:1.5; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// Inicializar mapa oscuro profesional
var map = L.map('map').setView([26.5, 56.5], 6); // Centro en Estrecho de Ormuz

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// Iconos personalizados
var shipIcon = L.icon({
  iconUrl: 'https://i.imgur.com/2z3vK8P.png', // Icono buque normal (puedes cambiar)
  iconSize: [32, 32],
  iconAnchor: [16, 16]
});

var attackedIcon = L.icon({
  iconUrl: 'https://i.imgur.com/8Y7kL2m.png', // Icono buque atacado/hundido
  iconSize: [32, 32],
  iconAnchor: [16, 16]
});

// Función para añadir evento visual
function addEvent(lat, lng, title, type, history) {
  var icon = type === 'attack' ? attackedIcon : shipIcon;
  
  var marker = L.marker([lat, lng], {icon: icon}).addTo(map);
  
  var popupContent = `
    <div class="custom-popup">
      <b>${title}</b><br><br>
      <div class="event-log">
        ${history.map(h => `• ${h.time} → ${h.desc}`).join('<br>')}
      </div>
      <button onclick="alert('Abriendo noticia completa en Telegram')">Ver en Telegram</button>
    </div>
  `;
  
  marker.bindPopup(popupContent);
  
  // Ejemplo de cambio de icono después de 8 segundos (simula ataque)
  if (type === 'ship') {
    setTimeout(() => {
      marker.setIcon(attackedIcon);
      marker.bindPopup(popupContent.replace('Buque saliendo', '🚨 Buque ATACADO'));
      map.openPopup(marker.getPopup());
    }, 8000);
  }
}

// ====================== EJEMPLOS VISUALES ======================

// 1. Buque saliendo de Ormuz
addEvent(26.8, 56.2, "🚢 Buque tanquero saliendo del Estrecho de Ormuz", "ship", [
  {time: "14:12", desc: "Buque 'Pacific Star' sale de Ormuz"},
  {time: "14:15", desc: "Dirección: Golfo Pérsico"}
]);

// 2. Ataque al mismo buque
addEvent(26.5, 56.8, "🔥 Ataque a buque en Ormuz", "attack", [
  {time: "14:12", desc: "Buque 'Pacific Star' sale de Ormuz"},
  {time: "14:28", desc: "🚨 Ataque con dron reportado"},
  {time: "14:31", desc: "Buque en llamas • Equipo de rescate en camino"}
]);

// Más ejemplos para que veas el concepto
addEvent(35.7, 51.4, "🇮🇷 Irán lanza maniobras militares", "military", [
  {time: "13:45", desc: "Anuncio oficial desde Teherán"}
]);

// ====================== CONEXIÓN FUTURA ======================
// Más adelante podrás conectar esto con tu bot de Telegram usando Redis o WebSocket
// Para que cada mensaje del bot añada o actualice un marcador automáticamente.

alert("✅ Mapa cargado correctamente.\n\nPrueba haciendo clic en los marcadores.\n\nEl sistema cambia iconos y guarda historial como pediste.");
</script>

</body>
</html>
