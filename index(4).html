<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoEconOrbit — Live Intelligence Globe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020912;--panel:#060f20;--border:#0d2040;--border2:#1a3a6a;
  --accent:#00d4ff;--red:#ff3333;--green:#00ff88;--gold:#ffd700;--orange:#ff8800;
  --text:#c8dff0;--text2:#5a7a9a;--text3:#2a4060;
  --hd:'Orbitron',monospace;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{display:flex;flex-direction:column;font-family:var(--mono);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.008) 3px,rgba(0,212,255,.008) 4px);}

/* HEADER */
header{height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;border-bottom:1px solid var(--border2);position:relative;z-index:100;
  background:linear-gradient(90deg,#020912 0%,#050e1c 50%,#020912 100%);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--accent) 30%,var(--red) 50%,var(--accent) 70%,transparent 100%);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-pulse{width:10px;height:10px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}
.logo h1{font-family:var(--hd);font-size:.82rem;font-weight:700;letter-spacing:3px;}
.logo h1 span{color:var(--accent);}
.live-tag{font-size:.6rem;color:var(--red);letter-spacing:2px;display:flex;align-items:center;gap:4px;}
.live-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1s infinite;}
.hd-stats{display:flex;gap:16px;font-size:.6rem;color:var(--text2);}
.hd-stats span b{color:var(--accent);}
.tg-link{font-family:var(--hd);font-size:.55rem;letter-spacing:1px;padding:5px 12px;
  border:1px solid var(--accent);color:var(--accent);text-decoration:none;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;}
.tg-link:hover{background:var(--accent);color:var(--bg);}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;}

/* GLOBE CONTAINER */
#globe-wrap{flex:1;position:relative;cursor:grab;}
#globe-wrap:active{cursor:grabbing;}
canvas{display:block;width:100%!important;height:100%!important;}

/* SIDE PANEL */
.side{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;font-family:var(--hd);font-size:.5rem;letter-spacing:1.5px;padding:8px 4px;
  text-align:center;cursor:pointer;color:var(--text2);border:none;background:transparent;
  border-bottom:2px solid transparent;transition:all .2s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,.04);}
.tc{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tc.on{display:flex;}

/* News list */
.news-scroll{flex:1;overflow-y:auto;}
.news-scroll::-webkit-scrollbar{width:3px;}
.news-scroll::-webkit-scrollbar-thumb{background:var(--border2);}
.ni{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s;position:relative;}
.ni::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ni:hover{background:rgba(0,212,255,.04);}
.ni.active{background:rgba(0,212,255,.08);}
.ni.active::before,.ni:hover::before{background:var(--accent);}
.ni.urg::before{background:var(--red)!important;}
.ni-urg{font-family:var(--hd);font-size:.5rem;letter-spacing:2px;color:var(--red);margin-bottom:3px;}
.ni-title{font-size:.75rem;color:var(--text);line-height:1.4;margin-bottom:4px;}
.ni-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tag{font-size:.55rem;padding:1px 6px;border:1px solid;}
.tag.c{border-color:var(--red);color:#ff6666;background:rgba(255,51,51,.08);}
.tag.m{border-color:#4488ff;color:#88aaff;background:rgba(68,136,255,.08);}
.tag.k{border-color:var(--green);color:#44ffaa;background:rgba(0,255,136,.08);}
.ni-hora{font-size:.55rem;color:var(--text3);}
.ni-src{font-size:.55rem;color:var(--text3);margin-top:2px;}

/* Aircraft/Ships list */
.tracker-list{flex:1;overflow-y:auto;padding:8px;}
.tracker-list::-webkit-scrollbar{width:3px;}
.tracker-list::-webkit-scrollbar-thumb{background:var(--border2);}
.tr-item{background:rgba(0,212,255,.04);border:1px solid var(--border);
  padding:8px 10px;margin-bottom:5px;transition:background .2s;cursor:pointer;}
.tr-item:hover{background:rgba(0,212,255,.08);}
.tr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.tr-callsign{font-family:var(--hd);font-size:.65rem;color:var(--accent);}
.tr-type{font-size:.55rem;color:var(--text2);}
.tr-detail{font-size:.58rem;color:var(--text2);line-height:1.6;}
.tr-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}

/* Detail panel */
.det-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--text3);font-size:.62rem;text-align:center;padding:20px;}
.det-ico{font-size:2rem;opacity:.2;}
.det-card{padding:14px;overflow-y:auto;flex:1;}
.det-card::-webkit-scrollbar{width:3px;}
.det-card::-webkit-scrollbar-thumb{background:var(--border2);}
.det-type{font-family:var(--hd);font-size:.5rem;letter-spacing:2px;margin-bottom:6px;}
.det-title{font-size:.85rem;font-weight:500;color:#fff;line-height:1.5;margin-bottom:8px;}
.det-desc{font-size:.72rem;color:var(--text2);line-height:1.6;margin-bottom:10px;}
.det-row{display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid var(--border);font-size:.58rem;}
.det-row span:first-child{color:var(--text3);}
.det-tg{display:block;margin-top:12px;text-align:center;font-family:var(--hd);font-size:.55rem;
  letter-spacing:1px;padding:8px;background:rgba(0,212,255,.08);border:1px solid var(--accent);
  color:var(--accent);text-decoration:none;transition:all .2s;}
.det-tg:hover{background:var(--accent);color:var(--bg);}

/* Chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);}
.cm{background:var(--panel);border:1px solid var(--border);border-radius:0 6px 6px 6px;
  padding:6px 9px;max-width:92%;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.cm.own{align-self:flex-end;border-radius:6px 0 6px 6px;background:rgba(0,212,255,.07);}
.cm-nick{font-size:.55rem;color:var(--accent);margin-bottom:2px;}
.cm.own .cm-nick{color:var(--green);}
.cm-text{font-size:.68rem;color:var(--text);line-height:1.4;}
.cm-time{font-size:.52rem;color:var(--text3);margin-top:2px;text-align:right;}
.chat-form{padding:8px;border-top:1px solid var(--border);display:flex;gap:5px;}
.chat-in{flex:1;background:rgba(0,0,0,.3);border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:.65rem;padding:6px 8px;outline:none;
  transition:border .2s;}
.chat-in:focus{border-color:var(--border2);}
.chat-btn{font-family:var(--hd);font-size:.5rem;padding:6px 10px;background:rgba(0,212,255,.1);
  border:1px solid var(--accent);color:var(--accent);cursor:pointer;transition:all .2s;}
.chat-btn:hover{background:var(--accent);color:var(--bg);}
.nick-wrap{padding:20px;display:flex;flex-direction:column;gap:10px;}
.nick-wrap label{font-size:.6rem;color:var(--text2);}
.nick-in{background:rgba(0,0,0,.3);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:.7rem;padding:8px 10px;outline:none;width:100%;}
.nick-btn{font-family:var(--hd);font-size:.58rem;letter-spacing:1px;padding:9px;
  background:rgba(0,212,255,.1);border:1px solid var(--accent);color:var(--accent);
  cursor:pointer;transition:all .2s;}
.nick-btn:hover{background:var(--accent);color:var(--bg);}

/* Filters */
.filter-bar{padding:7px 10px;display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.fb{font-size:.55rem;padding:3px 8px;background:transparent;border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;transition:all .2s;}
.fb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}
.fb:hover:not(.on){color:var(--text);}

/* Statusbar */
.statusbar{height:24px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:18px;padding:0 14px;font-size:.58rem;color:var(--text3);}
.statusbar b{color:var(--accent);}

/* Tooltip */
#tooltip{position:fixed;display:none;background:var(--panel);border:1px solid var(--border2);
  padding:8px 12px;font-size:.65rem;color:var(--text);pointer-events:none;z-index:9999;
  max-width:220px;line-height:1.5;}
#tooltip b{color:var(--accent);font-family:var(--hd);font-size:.6rem;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:9999;}
.loading-ring{width:60px;height:60px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-family:var(--hd);font-size:.65rem;letter-spacing:2px;color:var(--text2);}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//                     CONFIG
// ════════════════════════════════════════════════════════════
var CFG = {
  redis:   'https://loved-wallaby-71460.upstash.io',
  token:   'gQAAAAAAARckAAIncDIwNDA1YjBlMDJlMDI0YWQwYjE1YWM4YWUzODRjYmU0N3AyNzE0NjA',
  mapKey:  'geobot:noticias_mapa',
  chatKey: 'geobot:chat',
  tg:      'https://t.me/GeoEconOrbit',
  tick:    60,
};

// ════════════════════════════════════════════════════════════
//                  COORDENADAS ZONAS
// ════════════════════════════════════════════════════════════
var ZONES = {
  ukraine:[48.37,31.16],russia:[55.75,37.61],kyiv:[50.45,30.52],
  gaza:[31.35,34.30],israel:[31.77,35.21],iran:[32.43,53.68],tehran:[35.68,51.38],
  syria:[34.80,38.99],yemen:[15.55,48.51],houthi:[14.53,43.73],
  lebanon:[33.88,35.50],iraq:[33.22,43.67],baghdad:[33.34,44.40],
  taiwan:[23.70,121.00],china:[35.86,104.19],'north korea':[40.33,127.51],
  'red sea':[20.0,38.0],'persian gulf':[27.0,52.0],
  sudan:[15.55,32.53],somalia:[5.15,46.20],
  'saudi arabia':[24.68,46.72],pakistan:[30.37,69.34],
};

// ════════════════════════════════════════════════════════════
//                   STATE
// ════════════════════════════════════════════════════════════
var S = {
  news:[], aircraft:[], ships:[],
  filtro:'todos', trackFiltro:'todos',
  sel:null, nick:localStorage.getItem('geo_nick')||null,
  cd:60, seenH:new Set(),
  markers:[], acMarkers:[], shipMarkers:[],
};

// ════════════════════════════════════════════════════════════
//                THREE.JS GLOBE
// ════════════════════════════════════════════════════════════
var scene, camera, renderer, globe, clouds, stars;
var mouse = {x:0, y:0, down:false, lastX:0, lastY:0};
var rotX=0.3, rotY=0, autoRotate=true;
var raycaster = new THREE.Raycaster();
var mouseVec = new THREE.Vector2();
var clickables = []; // {mesh, data, type}

function initGlobe() {
  var wrap = document.getElementById('globe-wrap');
  var W = wrap.clientWidth, H = wrap.clientHeight;

  // Scene
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.z = 2.5;

  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  wrap.appendChild(renderer.domElement);

  // Stars
  var starsGeo = new THREE.BufferGeometry();
  var starVerts = [];
  for(var i=0; i<6000; i++) {
    var r = 80 + Math.random()*50;
    var theta = Math.random()*Math.PI*2;
    var phi = Math.acos(2*Math.random()-1);
    starVerts.push(
      r*Math.sin(phi)*Math.cos(theta),
      r*Math.sin(phi)*Math.sin(theta),
      r*Math.cos(phi)
    );
  }
  starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:0.12, transparent:true, opacity:0.7}));
  scene.add(stars);

  // Atmosphere glow
  var atmGeo = new THREE.SphereGeometry(1.015, 64, 64);
  var atmMat = new THREE.MeshBasicMaterial({
    color:0x0066aa, transparent:true, opacity:0.08, side:THREE.FrontSide
  });
  scene.add(new THREE.Mesh(atmGeo, atmMat));

  // Globe
  var geo = new THREE.SphereGeometry(1, 64, 64);
  var mat = new THREE.MeshPhongMaterial({
    color: 0x0a1628,
    emissive: 0x020810,
    specular: 0x003366,
    shininess: 15,
  });
  globe = new THREE.Mesh(geo, mat);
  scene.add(globe);

  // Grid lines on globe (latitude/longitude)
  addGlobeGrid();

  // Clouds layer
  var cloudGeo = new THREE.SphereGeometry(1.01, 32, 32);
  var cloudMat = new THREE.MeshBasicMaterial({
    color:0x224488, transparent:true, opacity:0.06, wireframe:false
  });
  clouds = new THREE.Mesh(cloudGeo, cloudMat);
  scene.add(clouds);

  // Lights
  scene.add(new THREE.AmbientLight(0x223355, 0.6));
  var sunLight = new THREE.DirectionalLight(0x4488ff, 0.8);
  sunLight.position.set(5, 3, 5);
  scene.add(sunLight);
  var rimLight = new THREE.DirectionalLight(0x002244, 0.3);
  rimLight.position.set(-5, -3, -5);
  scene.add(rimLight);

  // Event listeners
  var c = renderer.domElement;
  c.addEventListener('mousedown', onMouseDown);
  c.addEventListener('mousemove', onMouseMove);
  c.addEventListener('mouseup', onMouseUp);
  c.addEventListener('wheel', onWheel);
  c.addEventListener('click', onClick);
  c.addEventListener('touchstart', onTouchStart, {passive:true});
  c.addEventListener('touchmove', onTouchMove, {passive:true});
  c.addEventListener('touchend', onTouchEnd);

  window.addEventListener('resize', onResize);
  animate();
}

function addGlobeGrid() {
  var mat = new THREE.LineBasicMaterial({color:0x0d2a4a, transparent:true, opacity:0.4});
  // Latitude lines
  for(var lat=-60; lat<=60; lat+=30) {
    var pts = [];
    for(var lon=0; lon<=360; lon+=4) {
      var p = latLonToVec3(lat, lon, 1.001);
      pts.push(new THREE.Vector3(p.x, p.y, p.z));
    }
    var geo = new THREE.BufferGeometry().setFromPoints(pts);
    globe.add(new THREE.Line(geo, mat));
  }
  // Longitude lines
  for(var lon2=0; lon2<360; lon2+=30) {
    var pts2 = [];
    for(var lat2=-90; lat2<=90; lat2+=4) {
      var p2 = latLonToVec3(lat2, lon2, 1.001);
      pts2.push(new THREE.Vector3(p2.x, p2.y, p2.z));
    }
    var geo2 = new THREE.BufferGeometry().setFromPoints(pts2);
    globe.add(new THREE.Line(geo2, mat));
  }
}

function latLonToVec3(lat, lon, r) {
  r = r || 1;
  var phi = (90 - lat) * Math.PI/180;
  var theta = (lon + 180) * Math.PI/180;
  return {
    x: -r * Math.sin(phi) * Math.cos(theta),
    y: r * Math.cos(phi),
    z: r * Math.sin(phi) * Math.sin(theta),
  };
}

function addMarker(lat, lon, color, size, data, type) {
  var pos = latLonToVec3(lat, lon, 1.012);
  var geo = new THREE.SphereGeometry(size||0.012, 8, 8);
  var mat = new THREE.MeshBasicMaterial({color:color||0xff3333});
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, pos.y, pos.z);

  // Glow ring
  var ringGeo = new THREE.RingGeometry(size*1.5, size*2.5, 16);
  var ringMat = new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.3, side:THREE.DoubleSide});
  var ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(pos.x, pos.y, pos.z);
  ring.lookAt(0,0,0);
  scene.add(ring);

  globe.add(mesh);
  clickables.push({mesh, data, type});
  return mesh;
}

function addAircraftMarker(lat, lon, data) {
  var pos = latLonToVec3(lat, lon, 1.025);
  var color = data.military ? 0xff4400 : 0x00aaff;
  var geo = new THREE.SphereGeometry(0.008, 6, 6);
  var mat = new THREE.MeshBasicMaterial({color});
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, pos.y, pos.z);
  globe.add(mesh);
  clickables.push({mesh, data, type:'aircraft'});
  S.acMarkers.push(mesh);
  return mesh;
}

function addShipMarker(lat, lon, data) {
  var pos = latLonToVec3(lat, lon, 1.018);
  var color = 0x00ff88;
  var geo = new THREE.SphereGeometry(0.009, 6, 6);
  var mat = new THREE.MeshBasicMaterial({color});
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, pos.y, pos.z);
  globe.add(mesh);
  clickables.push({mesh, data, type:'ship'});
  S.shipMarkers.push(mesh);
  return mesh;
}

// Mouse/touch
function onMouseDown(e) {
  mouse.down=true; autoRotate=false;
  mouse.lastX=e.clientX; mouse.lastY=e.clientY;
}
function onMouseMove(e) {
  if(mouse.down) {
    var dx=e.clientX-mouse.lastX, dy=e.clientY-mouse.lastY;
    rotY+=dx*0.005; rotX+=dy*0.005;
    rotX=Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    mouse.lastX=e.clientX; mouse.lastY=e.clientY;
  }
  // Tooltip
  var wrap=document.getElementById('globe-wrap');
  var rect=wrap.getBoundingClientRect();
  mouseVec.x=((e.clientX-rect.left)/wrap.clientWidth)*2-1;
  mouseVec.y=-((e.clientY-rect.top)/wrap.clientHeight)*2+1;
  checkHover(e.clientX, e.clientY);
}
function onMouseUp(e) {
  mouse.down=false;
  setTimeout(function(){autoRotate=true;},3000);
}
function onWheel(e) {
  camera.position.z=Math.max(1.5, Math.min(6, camera.position.z+e.deltaY*0.003));
}
function onClick(e) {
  var wrap=document.getElementById('globe-wrap');
  var rect=wrap.getBoundingClientRect();
  mouseVec.x=((e.clientX-rect.left)/wrap.clientWidth)*2-1;
  mouseVec.y=-((e.clientY-rect.top)/wrap.clientHeight)*2+1;
  raycaster.setFromCamera(mouseVec, camera);
  var meshes=clickables.map(function(c){return c.mesh;});
  var hits=raycaster.intersectObjects(meshes);
  if(hits.length>0) {
    var hit=clickables.find(function(c){return c.mesh===hits[0].object;});
    if(hit) showDetail(hit.data, hit.type);
  }
}
var touchStart={x:0,y:0,dist:0};
function onTouchStart(e) {
  if(e.touches.length===1){
    mouse.down=true; autoRotate=false;
    mouse.lastX=e.touches[0].clientX; mouse.lastY=e.touches[0].clientY;
  }
}
function onTouchMove(e) {
  if(e.touches.length===1&&mouse.down){
    var dx=e.touches[0].clientX-mouse.lastX, dy=e.touches[0].clientY-mouse.lastY;
    rotY+=dx*0.005; rotX+=dy*0.005;
    mouse.lastX=e.touches[0].clientX; mouse.lastY=e.touches[0].clientY;
  }
}
function onTouchEnd(){mouse.down=false;setTimeout(function(){autoRotate=true;},2000);}
function onResize(){
  var w=document.getElementById('globe-wrap');
  camera.aspect=w.clientWidth/w.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(w.clientWidth,w.clientHeight);
}

function checkHover(mx, my) {
  raycaster.setFromCamera(mouseVec, camera);
  var meshes=clickables.map(function(c){return c.mesh;});
  var hits=raycaster.intersectObjects(meshes);
  var tt=document.getElementById('tooltip');
  if(hits.length>0) {
    var hit=clickables.find(function(c){return c.mesh===hits[0].object;});
    if(hit) {
      var d=hit.data;
      var html='';
      if(hit.type==='news') html='<b>'+esc(d.tipo||'NEWS')+'</b><br>'+esc((d.titulo||'').slice(0,80));
      else if(hit.type==='aircraft') html='<b>✈ '+(d.callsign||d.icao||'—')+'</b><br>'+esc(d.country||'')+' • '+(d.altitude||0)+' ft';
      else if(hit.type==='ship') html='<b>⚓ '+esc(d.name||'VESSEL')+'</b><br>'+esc(d.type||'')+' • '+esc(d.flag||'');
      tt.innerHTML=html;
      tt.style.display='block';
      tt.style.left=(mx+14)+'px';
      tt.style.top=(my-30)+'px';
      return;
    }
  }
  tt.style.display='none';
}

function animate() {
  requestAnimationFrame(animate);
  if(autoRotate) rotY+=0.0008;
  globe.rotation.x=rotX;
  globe.rotation.y=rotY;
  clouds.rotation.y=rotY*1.02;
  renderer.render(scene, camera);
}

function getCoords(n) {
  if(n.coords&&n.coords.length===2&&n.coords[0]!==0) return n.coords;
  var t=((n.titulo||'')+(n.desc||'')).toLowerCase();
  var keys=Object.keys(ZONES).sort(function(a,b){return b.length-a.length;});
  for(var i=0;i<keys.length;i++) if(t.indexOf(keys[i])!==-1) return ZONES[keys[i]];
  return null;
}

function h32(s){
  var h=5381;
  for(var i=0;i<s.length;i++) h=((h<<5)+h)^s.charCodeAt(i);
  return (h>>>0).toString(36);
}
function isDup(n){
  var k=h32((n.titulo||'').toLowerCase().replace(/\W/g,'').slice(0,80));
  if(S.seenH.has(k)) return true;
  S.seenH.add(k); return false;
}
function getTipo(t,d){
  var s=((t||'')+(d||'')).toLowerCase();
  if(/attack|strike|bombing|missile|killed|invasion|offensive/.test(s)) return 'conflicto';
  if(/military|aircraft|warship|nato|bomber|fleet/.test(s)) return 'militar';
  if(/oil|gold|opec|sanctions|market|price/.test(s)) return 'mercados';
  return 'conflicto';
}

async function fetchNews() {
  var items=[];
  // 1. Redis (bot news)
  try {
    var r=await fetch(CFG.redis+'/lrange/'+CFG.mapKey+'/0/99',{headers:{Authorization:'Bearer '+CFG.token}});
    var d=await r.json();
    (d.result||[]).forEach(function(s){try{items.push(JSON.parse(s));}catch(e){}});
  } catch(e){}

  // 2. GDELT — noticias geolocalizadas en tiempo real
  try {
    var g=await fetch('https://api.gdeltproject.org/api/v2/doc/doc?query=war+OR+conflict+OR+attack+OR+iran+OR+ukraine+OR+israel&mode=artlist&maxrecords=15&sort=DateDesc&format=json&timespan=60min');
    var gd=await g.json();
    (gd.articles||[]).forEach(function(a){
      if(!a.title) return;
      items.push({
        id:h32(a.title),titulo:a.title,desc:'',
        fuente:'GDELT/'+((a.domain||'').split('.')[0]),
        hora:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
        tipo:getTipo(a.title,''),urgente:/BREAKING|URGENT/i.test(a.title),
        coords:a.lat&&a.lon?[parseFloat(a.lat),parseFloat(a.lon)]:null,
      });
    });
  } catch(e){}

  // Dedup y enriquecer
  S.seenH.clear();
  S.news=items.filter(function(n){
    if(!n.titulo) return false;
    if(!n.tipo) n.tipo=getTipo(n.titulo,n.desc);
    return !isDup(n);
  }).sort(function(a,b){return (b.urgente?1:0)-(a.urgente?1:0);});
}

async function fetchAircraft() {
  try {
    // OpenSky Network — aviones en tiempo real (gratis, sin key)
    var bounds='?lamin=-90&lomin=-180&lamax=90&lomax=180';
    var r=await fetch('https://opensky-network.org/api/states/all'+bounds,{signal:AbortSignal.timeout(8000)});
    var d=await r.json();
    var states=d.states||[];
    // Filtrar: solo aviones con posición válida, tomar muestra de 200
    S.aircraft=states.filter(function(s){
      return s[5]&&s[6]&&s[8]===false; // lon, lat, on_ground=false
    }).slice(0,200).map(function(s){
      var alt=Math.round(s[7]||0);
      return {
        icao:s[0],callsign:(s[1]||'').trim(),country:s[2],
        lon:s[5],lat:s[6],altitude:alt,
        velocity:Math.round(s[9]||0),
        heading:Math.round(s[10]||0),
        military:isMilitary(s[0],s[1]||''),
      };
    });
    document.getElementById('st-ac').textContent=S.aircraft.length;
  } catch(e) {
    // Fallback: datos de ejemplo
    S.aircraft=[];
  }
}

function isMilitary(icao, callsign) {
  var milPatterns=['RCH','CHAOS','SPAR','USAF','NATO','PAT','BAF','GAF','SAF','HKY'];
  icao=icao.toUpperCase(); callsign=callsign.toUpperCase();
  return milPatterns.some(function(p){return callsign.startsWith(p);}) ||
    icao.startsWith('AE') || icao.startsWith('43C');
}

  // MarineTraffic free no tiene CORS — usar datos estáticos de zonas calientes

}

//              RENDER GLOBE MARKERS
// ════════════════════════════════════════════════════════════
function renderGlobeMarkers() {
  // Limpiar markers anteriores
  clickables=[];
  S.acMarkers.forEach(function(m){globe.remove(m);});
  S.shipMarkers.forEach(function(m){globe.remove(m);});
  S.acMarkers=[]; S.shipMarkers=[];
  // Limpiar news markers (children del globe que sean Mesh con tamaño >0.01)
  S.markers.forEach(function(m){globe.remove(m);scene.remove(m);});
  S.markers=[];

  // News markers
  var filtradas=getFiltradas();
  filtradas.forEach(function(n){
    var coords=getCoords(n);
    if(!coords) return;
    var color=n.urgente?0xff2222:
      n.tipo==='conflicto'?0xff5533:
      n.tipo==='militar'?0x4488ff:0x00ff88;
    var sz=n.urgente?0.018:0.013;
    var m=addMarker(coords[0],coords[1],color,sz,n,'news');
    S.markers.push(m);
  });

  // Aircraft markers
  var acFiltrados=S.aircraft.filter(function(a){
    if(S.trackFiltro==='militar') return a.military;
    if(S.trackFiltro==='civil') return !a.military;
    if(S.trackFiltro==='barcos') return false;
    return true;
  });
  acFiltrados.forEach(function(a){
    if(!a.lat||!a.lon) return;
    addAircraftMarker(a.lat,a.lon,a);
  });

  // Ship markers
  if(S.trackFiltro==='todos'||S.trackFiltro==='barcos') {
    S.ships.forEach(function(sh){
      if(!sh.lat||!sh.lon) return;
      addShipMarker(sh.lat,sh.lon,sh);
    });
  }
}

// ════════════════════════════════════════════════════════════
function getFiltradas() {
  return S.news.filter(function(n){
    if(S.filtro==='urgente') return n.urgente;
    if(S.filtro!=='todos') return n.tipo===S.filtro;
    return true;
  });
}

function renderNews() {
  var lista=document.getElementById('newsList');
  var f=getFiltradas();
  document.getElementById('st-news').textContent=S.news.length;
  if(!f.length){lista.innerHTML='<div style="padding:20px;color:var(--text3);font-size:.65rem;text-align:center">Sin noticias</div>';return;}
  lista.innerHTML='';
  f.forEach(function(n){
    var div=document.createElement('div');
    div.className='ni'+(n.urgente?' urg':'');
    var tagClass=n.tipo==='conflicto'?'c':n.tipo==='militar'?'m':'k';
    div.innerHTML=
      (n.urgente?'<div class="ni-urg">⚠ URGENTE</div>':'')+
      '<div class="ni-title">'+esc(n.titulo)+'</div>'+
      '<div class="ni-meta"><span class="tag '+tagClass+'">'+tipoIcon(n.tipo)+'</span>'+
      '<span class="ni-hora">'+n.hora+'</span></div>'+
      '<div class="ni-src">'+esc(n.fuente||'')+'</div>';
    div.onclick=function(){showDetail(n,'news');};
    lista.appendChild(div);
  });
}

function renderTracker() {
  var lista=document.getElementById('trackerList');
  lista.innerHTML='';
  var acShow=S.aircraft.filter(function(a){
    if(S.trackFiltro==='barcos') return false;
    if(S.trackFiltro==='militar') return a.military;
    if(S.trackFiltro==='civil') return !a.military;
    return true;
  }).slice(0,50);

  if(S.trackFiltro!=='civil'&&S.trackFiltro!=='militar') {
    S.ships.forEach(function(sh){
      var div=document.createElement('div');
      div.className='tr-item';
      div.innerHTML='<div class="tr-header"><span class="tr-callsign">⚓ '+esc(sh.name)+'</span><span class="tr-type">'+sh.flag+' '+esc(sh.type)+'</span></div>'+
        '<div class="tr-detail">Velocidad: '+sh.speed+' kn | '+esc(sh.flag)+'</div>';
      div.onclick=function(){showDetail(sh,'ship');};
      lista.appendChild(div);
    });
  }

  acShow.forEach(function(a){
    var div=document.createElement('div');
    div.className='tr-item';
    var dotColor=a.military?'#ff4400':'#00aaff';
    div.innerHTML='<div class="tr-header">'+
      '<span class="tr-callsign"><span class="tr-dot" style="background:'+dotColor+'"></span>'+esc(a.callsign||a.icao)+'</span>'+
      '<span class="tr-type">'+(a.military?'🪖 MIL':'✈ CIV')+'</span></div>'+
      '<div class="tr-detail">'+esc(a.country)+' | '+a.altitude+' ft | '+a.velocity+' kt | HDG '+a.heading+'°</div>';
    div.onclick=function(){showDetail(a,'aircraft');};
    lista.appendChild(div);
  });

  if(!lista.children.length) {
    lista.innerHTML='<div style="padding:20px;color:var(--text3);font-size:.65rem;text-align:center">Sin datos</div>';
  }
}

function showDetail(data, type) {
  setTab('detail', null);
  document.getElementById('detEmpty').style.display='none';
  var card=document.getElementById('detCard');
  card.style.display='block';
  var html='';
  if(type==='news') {
    var col=data.tipo==='conflicto'?'var(--red)':data.tipo==='militar'?'#66aaff':'var(--green)';
    html='<div class="det-type" style="color:'+col+'">'+tipoIcon(data.tipo)+' '+data.tipo.toUpperCase()+'</div>'+
      '<div class="det-title">'+(data.urgente?'🚨 ':'')+esc(data.titulo)+'</div>'+
      (data.desc?'<div class="det-desc">'+esc(data.desc)+'</div>':'')+
      '<div class="det-row"><span>FUENTE</span><span>'+esc(data.fuente||'—')+'</span></div>'+
      '<div class="det-row"><span>HORA</span><span>'+data.hora+' UTC</span></div>'+
      '<div class="det-row"><span>URGENTE</span><span>'+(data.urgente?'SÍ ⚠':'NO')+'</span></div>'+
      '<a href="'+CFG.tg+'" target="_blank" class="det-tg">📢 VER CANAL COMPLETO</a>';
  } else if(type==='aircraft') {
    html='<div class="det-type" style="color:'+(data.military?'var(--orange)':'var(--accent)')+'">'+
      (data.military?'🪖 AERONAVE MILITAR':'✈ AERONAVE CIVIL')+'</div>'+
      '<div class="det-title">'+(data.callsign||data.icao||'DESCONOCIDO')+'</div>'+
      '<div class="det-row"><span>ICAO</span><span>'+esc(data.icao)+'</span></div>'+
      '<div class="det-row"><span>PAÍS</span><span>'+esc(data.country)+'</span></div>'+
      '<div class="det-row"><span>ALTITUD</span><span>'+data.altitude+' ft</span></div>'+
      '<div class="det-row"><span>VELOCIDAD</span><span>'+data.velocity+' kt</span></div>'+
      '<div class="det-row"><span>RUMBO</span><span>'+data.heading+'°</span></div>'+
      '<div class="det-row"><span>POSICIÓN</span><span>'+data.lat.toFixed(2)+'°N '+data.lon.toFixed(2)+'°E</span></div>';
  } else if(type==='ship') {
    html='<div class="det-type" style="color:var(--green)">⚓ EMBARCACIÓN</div>'+
      '<div class="det-title">'+esc(data.name)+'</div>'+
      '<div class="det-row"><span>TIPO</span><span>'+esc(data.type)+'</span></div>'+
      '<div class="det-row"><span>BANDERA</span><span>'+esc(data.flag)+'</span></div>'+
      '<div class="det-row"><span>VELOCIDAD</span><span>'+data.speed+' kn</span></div>';
  }
  card.innerHTML=html;
}

window.setNick=function(){
  var v=document.getElementById('nickIn').value.trim().slice(0,20);
  if(!v) return;
  S.nick=v; localStorage.setItem('geo_nick',v);
  document.getElementById('nickWrap').style.display='none';
  document.getElementById('chatWrap').style.display='flex';
  loadChat(); setInterval(loadChat,5000);
};
async function loadChat(){
  try{
    var r=await fetch(CFG.redis+'/lrange/'+CFG.chatKey+'/0/29',{headers:{Authorization:'Bearer '+CFG.token}});
    var d=await r.json();
    var msgs=(d.result||[]).map(function(s){try{return JSON.parse(s);}catch(e){return null;}}).filter(Boolean).reverse();
    var c=document.getElementById('chatMsgs');
    var bot=c.scrollTop+c.clientHeight>=c.scrollHeight-10;
    c.innerHTML='';
    msgs.forEach(function(m){
      var div=document.createElement('div');
      div.className='cm'+(m.nick===S.nick?' own':'');
      div.innerHTML='<div class="cm-nick">'+esc(m.nick)+'</div><div class="cm-text">'+esc(m.text)+'</div><div class="cm-time">'+m.hora+'</div>';
      c.appendChild(div);
    });
    if(bot) c.scrollTop=c.scrollHeight;
  }catch(e){}
}
window.sendMsg=async function(){
  var inp=document.getElementById('chatIn');
  var txt=inp.value.trim().slice(0,200);
  if(!txt||!S.nick) return;
  inp.value='';
  var msg=JSON.stringify({nick:S.nick,text:txt,hora:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})});
  try{
    await fetch(CFG.redis+'/pipeline',{method:'POST',headers:{Authorization:'Bearer '+CFG.token},
      body:JSON.stringify([['lpush',CFG.chatKey,msg],['ltrim',CFG.chatKey,0,49],['expire',CFG.chatKey,86400]])});
    loadChat();
  }catch(e){}
};

window.setTab=function(t,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.tc').forEach(function(c){c.classList.remove('on');});
  document.getElementById('tc-'+t).classList.add('on');
  if(btn) btn.classList.add('on');
  else {
    var tabs=document.querySelectorAll('.tab');
    var map={'news':0,'track':1,'detail':2,'chat':3};
    if(map[t]!==undefined) tabs[map[t]].classList.add('on');
  }
  if(t==='chat'&&S.nick) loadChat();
};
window.setFiltro=function(f,btn){
  S.filtro=f;
  document.querySelectorAll('.filter-bar .fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderNews(); renderGlobeMarkers();
};
window.setTrackFiltro=function(f,btn){
  S.trackFiltro=f;
  document.querySelectorAll('#tc-track .fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderTracker(); renderGlobeMarkers();
};
function tipoIcon(t){return{conflicto:'⚔',militar:'✈',mercados:'📊'}[t]||'📍';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function cargar() {
  await Promise.all([fetchNews(), fetchAircraft(), fetchShips()]);
  renderNews();
  renderTracker();
  renderGlobeMarkers();
  document.getElementById('st-time').textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

setInterval(function(){
  S.cd--;
  document.getElementById('sb-cd').textContent=Math.max(0,S.cd)+'s';
  if(S.cd<=0){S.cd=CFG.tick;cargar();}
},1000);

// Aviones cada 30s (OpenSky actualiza cada ~10s)
